      - "设计系统构建"

  - name: "云服务与运维"
    icon: "cloud"
    description: "提供云架构设计、部署和运维服务，确保系统稳定可靠。"
    features:
      - "云服务器配置（AWS/阿里云/腾讯云）"
      - "容器化部署（Docker/Kubernetes）"
