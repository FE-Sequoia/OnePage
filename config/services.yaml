services:
  - name: "Web 开发"
    icon: "code"
    description: "提供高质量的Web应用开发服务，包括前端开发、后端开发和API设计。"
    features:
      - "前端开发（React/Vue/Angular）"
      - "后端开发（Node.js/Python/Go）"
      - "RESTful API 设计"
      - "微服务架构"
      - "数据库设计与优化"

  - name: "移动端开发"
    icon: "mobile"
    description: "专注于iOS和Android原生及跨平台移动应用开发。"
