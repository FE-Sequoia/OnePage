# OnePage 团队模式配置
# 将此文件重命名为 config.yaml 使用团队模式

mode: team  # personal / team

# 站点基础信息
site:
  title: "创新工作室"
  description: "专注于为客户提供优质的互联网解决方案"
  logo: "https://placehold.co/200x80/3b82f6/ffffff?text=Logo"
  favicon: "/favicon.ico"

# 公司信息
company:
  name: "创新工作室"
  founded: "2020年"
  description: |
    我们是一家专注于互联网产品设计与开发的工作室。
    致力于为客户提供高质量的技术解决方案，
    帮助企业实现数字化转型。
  values:
    - "客户至上"
    - "技术创新"
    - "质量第一"
    - "持续学习"
  address: "北京市朝阳区xxx大厦"
  phone: "138-0000-0000"
  email: "hello@example.com"

# 社交链接
socials:
  - platform: "微信"
    url: "wechat-id"
    icon: "wechat"
  - platform: "微博"
    url: "https://weibo.com/example"
    icon: "weibo"
  - platform: "GitHub"
    url: "https://github.com/example"
    icon: "github"

# 团队成员（引用 members.yaml）
members_file: "./config/members.yaml"

# 案例展示（引用 portfolio.yaml）
portfolio_file: "./config/portfolio.yaml"

# 服务范围（引用 services.yaml）
services_file: "./config/services.yaml"

# 新闻动态（引用 news.yaml）
news_file: "./config/news.yaml"

# 主题配置
theme:
  mode: "auto"
  theme: "blue"

# 首页设置
home:
  hero_title: "让技术创造价值"
  hero_subtitle: "专业互联网解决方案提供商"
  show_case_count: 4
  show_news_count: 3