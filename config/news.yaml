  - title: " Flutter 3.0 新特性解析"
    date: "2024-11-20"
    category: "技术分享"
    summary: "本文深入分析Flutter 3.0的重大更新，包括Impeller渲染引擎、性能优化等内容。"
    content: |
      Flutter 3.0带来了重大更新，本文深入分析主要新特性：
      
      ## Impeller渲染引擎
      相比旧的Skia引擎，Impeller在iOS上性能提升显著。
      
      ## 跨平台支持
      更好的Web和桌面应用支持，一个代码库，多端部署。
      
      ##  Material 3
      全新设计语言，更现代的组件库。
      
      ## 性能优化
      编译速度大幅提升，热重载更快。

