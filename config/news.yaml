  - title: "React Server Components 实战指南"
    date: "2024-09-15"
    category: "技术分享"
    summary: "深入讲解React Server Components的使用场景和最佳实践。"
    content: |
      React Server Components (RSC) 是React生态的重要更新。
      
      ## 什么是RSC
      允许组件在服务端渲染，同时支持客户端交互。
      
      ## 使用场景
      - 数据获取
      - 减少客户端JavaScript
      - SEO优化
      
      ## 最佳实践
      合理区分服务端和客户端组件，发挥各自优势。